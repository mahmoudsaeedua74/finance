<!DOCTYPE html>

<html dir="ltr" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - FinTrack</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>

                    },
                    "borderRadius": {

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-surface-container-low text-on-surface font-body-md text-body-md antialiased min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">
<main class="w-full max-w-[440px] bg-surface-container-lowest border border-slate-200 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative overflow-hidden flex flex-col">
<div class="absolute top-0 left-0 w-full h-1 bg-primary-container"></div>
<div class="p-8 sm:p-10 flex-grow flex flex-col justify-center">
<div class="flex items-center justify-center mb-8 gap-3">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-white text-[22px]" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<span class="font-display-md text-display-md text-slate-900 tracking-tight">FinTrack</span>
</div>
<div class="text-center mb-8 space-y-2">
<h1 class="font-header-lg text-header-lg text-slate-900">Welcome Back</h1>
<p class="font-caption-lg text-caption-lg text-slate-500">Securely manage your wealth portfolio.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<div class="space-y-2 text-left rtl:text-right">
<label class="block font-caption-sm text-caption-sm text-slate-900" for="email">Email Address</label>
<div class="relative">
<span class="absolute left-3.5 rtl:left-auto rtl:right-3.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 rtl:pr-10 rtl:pl-4 py-3 bg-surface border border-slate-200 rounded-lg font-body-md text-body-md text-slate-900 focus:outline-none focus:ring-2 focus:ring-secondary-container focus:border-secondary-container transition-all placeholder:text-slate-400" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="space-y-2 text-left rtl:text-right">
<div class="flex justify-between items-center">
<label class="block font-caption-sm text-caption-sm text-slate-900" for="password">Password</label>
<a class="font-caption-sm text-caption-sm text-primary-container hover:text-secondary font-semibold transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute left-3.5 rtl:left-auto rtl:right-3.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-[20px]">lock</span>
<input class="w-full pl-10 pr-10 rtl:pr-10 rtl:pl-10 py-3 bg-surface border border-slate-200 rounded-lg font-body-md text-body-md text-slate-900 focus:outline-none focus:ring-2 focus:ring-secondary-container focus:border-secondary-container transition-all placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 rtl:right-auto rtl:left-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-900 focus:outline-none transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full bg-primary-container text-white font-caption-lg text-caption-lg py-3 rounded-lg hover:bg-slate-900 transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container flex justify-center items-center gap-2 group" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px] rtl:rotate-180 group-hover:translate-x-1 rtl:group-hover:-translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 text-center border-t border-slate-100 pt-6">
<p class="font-caption-lg text-caption-lg text-slate-500">
                    Don't have an account? 
                    <a class="text-primary-container font-semibold hover:text-secondary transition-colors ml-1 rtl:ml-0 rtl:mr-1" href="#">Create Account</a>
</p>
</div>
</div>
</main>
<div class="mt-8 flex gap-4 text-slate-400 font-caption-sm text-caption-sm">
<a class="hover:text-slate-900 transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-slate-900 transition-colors" href="#">Terms of Service</a>
</div>
</body></html>
